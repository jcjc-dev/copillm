name: Upstream e2e

# Cross-platform e2e against the real published @openai/codex and
# @anthropic-ai/claude-code packages. Acts as:
#   - a nightly canary that catches upstream wire-format regressions
#     even when copillm itself hasn't changed
#   - the pre-publish gate invoked by release.yml (via workflow_call)
#     before pushing a new version to npm
#
# Does not run on PRs (pr-gate.yml covers those with synthetic clients).

on:
  schedule:
    # Nightly run at 09:00 UTC to catch upstream Codex / Claude Code regressions
    - cron: "0 9 * * *"
  workflow_dispatch:
    inputs:
      codex_package:
        description: "@openai/codex package spec (defaults to @latest)"
        required: false
        default: "@openai/codex@latest"
      claude_package:
        description: "@anthropic-ai/claude-code package spec (defaults to @latest)"
        required: false
        default: "@anthropic-ai/claude-code@latest"
  workflow_call:
    inputs:
      codex_package:
        description: "@openai/codex package spec (defaults to @latest)"
        required: false
        type: string
        default: "@openai/codex@latest"
      claude_package:
        description: "@anthropic-ai/claude-code package spec (defaults to @latest)"
        required: false
        type: string
        default: "@anthropic-ai/claude-code@latest"

concurrency:
  group: upstream-e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  e2e-real-clients:
    name: ${{ matrix.os }} / Node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: ["20", "22"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund --prefer-offline

      - name: Build
        run: npm run build

      - name: Unit tests (vitest)
        run: npm test

      - name: E2E PR-gate runner (sanity check against synthetic clients)
        run: npm run test:e2e:pr
        env:
          CI: "true"

      - name: E2E upstream runner (real @openai/codex + @anthropic-ai/claude-code)
        run: npm run test:e2e:release
        env:
          CI: "true"
          COPILLM_E2E_CODEX_PACKAGE: ${{ inputs.codex_package || '@openai/codex@latest' }}
          COPILLM_E2E_CLAUDE_PACKAGE: ${{ inputs.claude_package || '@anthropic-ai/claude-code@latest' }}
