name: Publish to npm

# Release flow:
#   1. Open a PR bumping `version` in package.json (and package-lock.json).
#   2. Merge to main (pr-gate must be green).
#   3. auto-tag.yml creates v<version> tag + GitHub Release automatically.
#   4. This workflow runs on `release: published`: gate matrix first, then npm
#      publish via OIDC trusted publishing (no NPM_TOKEN secret).

on:
  release:
    types: [published]
  workflow_dispatch: {}

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write # REQUIRED for npm OIDC trusted publishing + provenance

jobs:
  gate:
    name: Release gate
    uses: ./.github/workflows/release-gate.yml

  publish:
    name: Build, test, and publish
    needs: gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: npm-publish # optional: lets you require manual approval in repo settings
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      # npm >= 11.5.1 is required for OIDC trusted publishing.
      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci --no-audit --no-fund --prefer-offline

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm test

      - name: Verify tag matches package.json version
        if: github.event_name == 'release'
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg=$(node -p "require('./package.json').version")
          if [ "$tag" != "$pkg" ]; then
            echo "Release tag ($tag) does not match package.json version ($pkg)" >&2
            exit 1
          fi

      - name: Publish to npm (with provenance)
        run: npm publish --provenance --access public
