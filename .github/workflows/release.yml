name: Release

# Linear release pipeline: detect version bump → tag → gate → npm publish → GitHub Release.
#
# Trigger: a push to main that modifies package.json. If the "version" field
# changed and no v<version> tag exists yet, the pipeline runs end-to-end.
# Otherwise the detect job no-ops and downstream jobs are skipped.
#
# Manual `workflow_dispatch` is also available to retry a release for the
# current package.json version (idempotent — skips if the tag already exists).
#
# This consolidates what used to be auto-tag.yml + publish.yml so the whole
# release happens in one workflow run, sidestepping the GITHUB_TOKEN cannot
# trigger other workflows rule.

on:
  push:
    branches: [main]
    paths:
      - "package.json"
  workflow_dispatch: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write # tags + GitHub Releases
  id-token: write # npm OIDC trusted publishing + provenance

jobs:
  detect:
    name: Detect version bump
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.pkg.outputs.version }}
      tag: ${{ steps.pkg.outputs.tag }}
      should_release: ${{ steps.tag_check.outputs.should_release }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from package.json
        id: pkg
        run: |
          version=$(node -p "require('./package.json').version")
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"
          echo "package.json version: $version"

      - name: Check whether tag already exists
        id: tag_check
        env:
          TAG: ${{ steps.pkg.outputs.tag }}
        run: |
          if git rev-parse --verify --quiet "refs/tags/$TAG" >/dev/null; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG already exists locally; nothing to release."
          elif git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG already exists on origin; nothing to release."
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG does not exist; will release."
          fi

  tag:
    name: Create and push tag
    needs: detect
    if: needs.detect.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and push tag
        env:
          TAG: ${{ needs.detect.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "$TAG"
          git push origin "$TAG"

  gate:
    name: Upstream e2e gate
    needs: [detect, tag]
    if: needs.detect.outputs.should_release == 'true'
    uses: ./.github/workflows/upstream-e2e.yml

  publish:
    name: Build, test, and publish to npm
    needs: [detect, tag, gate]
    if: needs.detect.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: npm-publish # optional manual approval lives here
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.detect.outputs.tag }}

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      # npm >= 11.5.1 is required for OIDC trusted publishing.
      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci --no-audit --no-fund --prefer-offline

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm test

      - name: Verify tag matches package.json version
        env:
          TAG: ${{ needs.detect.outputs.tag }}
        run: |
          stripped="${TAG#v}"
          pkg=$(node -p "require('./package.json').version")
          if [ "$stripped" != "$pkg" ]; then
            echo "Tag ($stripped) does not match package.json version ($pkg)" >&2
            exit 1
          fi

      - name: Publish to npm (with provenance)
        run: npm publish --provenance --access public

  release:
    name: Create GitHub Release
    needs: [detect, tag, gate, publish]
    if: needs.detect.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.detect.outputs.tag }}
        run: |
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TAG" \
            --generate-notes
