name: Auto-tag on version bump

# When a push to main changes package.json's "version" field, create a matching
# v<version> tag (if it doesn't already exist) and a GitHub Release. Publishing
# the Release triggers publish.yml, which gates on release-gate.yml before
# pushing to npm.
#
# This removes the manual `npm version` / `git tag` / `gh release create` dance
# from the release flow. To cut a release: open a PR that bumps the version in
# package.json (+ package-lock.json), get it merged, and this workflow handles
# the rest.

on:
  push:
    branches: [main]
    paths:
      - "package.json"
  workflow_dispatch: {}

concurrency:
  group: auto-tag-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write # required to push tags and create releases

jobs:
  tag-and-release:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need full history for `git tag` lookups

      - name: Read version from package.json
        id: pkg
        run: |
          version=$(node -p "require('./package.json').version")
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"
          echo "package.json version: $version"

      - name: Check whether tag already exists
        id: tag_check
        env:
          TAG: ${{ steps.pkg.outputs.tag }}
        run: |
          if git rev-parse --verify --quiet "refs/tags/$TAG" >/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG already exists locally; nothing to do."
          elif git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG already exists on origin; nothing to do."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG does not exist; will create."
          fi

      - name: Create and push tag
        if: steps.tag_check.outputs.exists == 'false'
        env:
          TAG: ${{ steps.pkg.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "$TAG"
          git push origin "$TAG"

      - name: Create GitHub Release
        if: steps.tag_check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.pkg.outputs.tag }}
        run: |
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes
